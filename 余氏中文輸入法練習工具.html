        const pureTarget = target.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, "");
        const isTextCorrect = (pureInput === pureTarget);
        const lastChar = cleanInput.slice(-1);
        const isLastPunc = /[^\u4e00-\u9fa5a-zA-Z0-9]/.test(lastChar);
        return isTextCorrect && isLastPunc;
    }

    function updateScore() {
        const total = currentPoem.sentences.length;
        const correctCount = Object.values(correctStatus).filter(v => v).length;
        document.getElementById("scoreDisplay").innerText = `正確: ${correctCount} / ${total}`;
    }

    // 安全的焦點轉移函數，等待輸入法狀態穩定
    function safeFocusNext(index) {
        if (index >= currentPoem.sentences.length) return;
        
        // 如果正在輸入法組合中，記錄待轉移的索引
        if (compositionActive) {
            pendingFocusIndex = index;
            return;
        }
        
        // 使用雙重 requestAnimationFrame 確保 DOM 和輸入法狀態穩定
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                const nextInput = inputElements[index];
                if (nextInput) {
                    // 短暫延遲後再聚焦，避免與輸入法事件衝突
                    setTimeout(() => {
                        nextInput.focus();
                        // 將游標移到末尾
                        if (nextInput.value.length > 0) {
                            nextInput.setSelectionRange(nextInput.value.length, nextInput.value.length);
                        }
                        nextInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 50);
                }
                pendingFocusIndex = -1;
            });
        });
    }

    function render() {
        document.getElementById("displayTitle").innerText = currentPoem.title;
        document.getElementById("displayAuthor").innerText = "〔" + currentPoem.author + "〕";
        document.getElementById("displayRef").innerText = currentPoem.sentences.map(s => s.text).join("");

        const area = document.getElementById("practiceArea");
        area.innerHTML = "";
        inputElements = [];
        
        currentPoem.sentences.forEach((data, i) => {
            const card = document.createElement("div");
            card.className = "sentence-card" + (correctStatus[i] ? " correct-bg" : "");
            card.innerHTML = `
                <div class="chinese-line">${data.text}</div>
                <div class="yucode-hint">拆碼：<span>${data.yucode}</span></div>
                <div class="input-row">
                    <input type="text" id="input-${i}" value="${userAnswers[i] || ''}" autocomplete="off" placeholder="輸入文字+標點..." inputmode="text" enterkeyhint="done">
                    <div class="status-icon" id="status-${i}">${correctStatus[i] ? "✔️" : "📝"}</div>
                </div>
            `;
            area.appendChild(card);

            const input = card.querySelector("input");
            inputElements[i] = input;
            
            // 追蹤輸入法組合狀態
            input.addEventListener('compositionstart', () => {
                compositionActive = true;
            });
            
            input.addEventListener('compositionend', (e) => {
                compositionActive = false;
                // 組合結束後檢查是否有待處理的焦點轉移
                if (pendingFocusIndex >= 0) {
                    const idx = pendingFocusIndex;
                    pendingFocusIndex = -1;
                    setTimeout(() => safeFocusNext(idx), 30);
                }
                
                // 手動觸發一次檢查，因為某些 Android 輸入法在 compositionend 時值可能尚未完全更新
                setTimeout(() => {
                    const val = input.value;
                    userAnswers[i] = val;
                    const isMatch = checkMatch(val, data.text);
                    correctStatus[i] = isMatch;
                    input.className = val === "" ? "" : (isMatch ? "correct-input" : "");
                    document.getElementById(`status-${i}`).innerText = isMatch ? "✔️" : (val === "" ? "📝" : "❌");
                    card.classList.toggle("correct-bg", isMatch);
                    updateScore();
                    
                    if (isMatch && i < currentPoem.sentences.length - 1) {
                        pendingFocusIndex = i + 1;
                        safeFocusNext(i + 1);
                    }
                }, 10);
            });

            input.addEventListener("input", (e) => {
                const val = e.target.value;
                userAnswers[i] = val;
                const isMatch = checkMatch(val, data.text);
                correctStatus[i] = isMatch;
                input.className = val === "" ? "" : (isMatch ? "correct-input" : "");
                document.getElementById(`status-${i}`).innerText = isMatch ? "✔️" : (val === "" ? "📝" : "❌");
                card.classList.toggle("correct-bg", isMatch);
                updateScore();
                
                // 只有在非輸入法組合狀態下才觸發焦點轉移
                if (isMatch && i < currentPoem.sentences.length - 1 && !compositionActive) {
                    safeFocusNext(i + 1);
                } else if (isMatch && i < currentPoem.sentences.length - 1) {
                    // 如果正在組合中，記錄待轉移索引
                    pendingFocusIndex = i + 1;
                }
            });
            
            // 防止 Enter 鍵觸發意外提交
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    input.blur();
                    setTimeout(() => input.focus(), 10);
                }
            });
            
            // 失去焦點時清除 pending 狀態
            input.addEventListener('blur', () => {
                // 不清除 pendingFocusIndex，因為可能是要轉移到下一個
            });
        });
        updateScore();
    }

    document.getElementById("poemSelector").addEventListener("change", function(e) {
        currentPoem = allLibrary[e.target.value];
        userAnswers = {};
        correctStatus = {};
        pendingFocusIndex = -1;
        compositionActive = false;
        render();
    });

    document.getElementById("resetBtn").onclick = () => {
        userAnswers = {};
        correctStatus = {};
        pendingFocusIndex = -1;
        compositionActive = false;
        render();
    };

    setInterval(() => {
        timerSeconds++;
        const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
        const s = (timerSeconds % 60).toString().padStart(2, '0');
        document.getElementById("timerDisplay").innerText = `${m}:${s}`;
    }, 1000);

    window.onload = render;
</script>

</body>
</html>
