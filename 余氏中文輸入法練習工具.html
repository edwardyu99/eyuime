<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>余氏中文輸入法練習工具</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background: #2b2b2b; margin: 0; padding: 15px; color: #e8e6e1;
        }
        .container {
            max-width: 900px; margin: 0 auto; background: #1e1e1a;
            border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            padding: 20px; border: 1px solid #4a4a3a;
        }
        /* 下拉選單樣式 */
        .selector-section {
            text-align: center; margin-bottom: 20px; background: #2a2a20;
            padding: 15px; border-radius: 15px; border: 1px dashed #5a5a42;
        }
        .selector-section label { margin-right: 10px; color: #e8d48b; font-weight: bold; }
        #poemSelector {
            padding: 8px 15px; border-radius: 30px; background: #3a3a30;
            color: #f0e8d0; border: 2px solid #e8d48b; font-size: 1rem; cursor: pointer;
        }

        .poem-info { text-align: center; margin: 15px 0; }
        .poem-title { font-size: 1.6rem; font-weight: bold; color: #f0e8b0; display: block; }
        .poem-author { font-size: 0.9rem; color: #aaa97a; margin-top: 5px; display: block; }
        
        .poem-block {
            background: #2a2a22; border-left: 5px solid #c4b87a;
            padding: 15px; border-radius: 12px; margin-bottom: 25px;
            font-size: 1rem; line-height: 1.6; color: #e0dcb0; text-align: center;
        }
        .practice-area { background: #252520; border-radius: 15px; padding: 10px 5px; }
        .sentence-card {
            background: #2f2f28; margin-bottom: 15px; padding: 12px;
            border-radius: 18px; border: 1px solid #4a4a3a; transition: 0.2s;
        }
        .sentence-card:focus-within { border-color: #e8d48b; background: #36362e; }
        .sentence-card.correct-bg { background: #2e3e2a; border-left: 6px solid #8ab86a; }
        
        .chinese-line { font-size: 1.2rem; font-weight: 500; margin-bottom: 8px; color: #f0e8b0; }
        .yucode-hint {
            background: #1e1e18; padding: 6px 10px; border-radius: 10px;
            font-size: 0.85rem; color: #c4dc9a; margin-bottom: 10px;
            font-family: monospace; border: 1px solid #3a3a2e;
        }
        .yucode-hint span { color: #e8d48b; font-weight: bold; }
        
        .input-row { display: flex; align-items: center; gap: 10px; }
        .input-row input {
            flex: 1; padding: 10px 15px; font-size: 1.1rem; border: 2px solid #5a5a42;
            border-radius: 50px; background: #3a3a30; color: #f0e8d0; outline: none;
        }
        .input-row input.correct-input { border-color: #8ab86a; background: #2a4a24; }
        .status-icon { font-size: 1.4rem; width: 30px; text-align: center; }

        .action-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: #2a2a20; padding: 10px 20px; border-radius: 50px;
            position: sticky; bottom: 10px; box-shadow: 0 -4px 15px rgba(0,0,0,0.5);
        }
        .score-panel { background: #4a6a3a; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        button { background: #5a5a3a; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; color: #f0e8c0; font-weight: bold; }
        
        @media (max-width: 600px) {
            .input-row { flex-direction: column; align-items: stretch; }
            .status-icon { align-self: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="selector-section">
        <label for="poemSelector">選擇練習曲目：</label>
        <select id="poemSelector">
            <option value="0">青玉案 · 元夕</option>
            <option value="1">水調歌頭</option>
            <option value="2">相見歡</option>
            <option value="3">登高</option>
            <option value="4">靜夜思</option>
	    <option value="5">花妖</option>
	    <option value="6">翩翩</option>
	    <option value="7">羅剎海市</option>
        </select>
    </div>

    <div class="poem-info">
        <span class="poem-title" id="displayTitle">載入中...</span>
        <span class="poem-author" id="displayAuthor">載入中...</span>
    </div>

    <div class="poem-block" id="displayRef"></div>

    <div class="practice-area" id="practiceArea"></div>

    <div class="action-bar">
        <div class="score-panel" id="scoreDisplay">正確: 0 / 0</div>
        <div id="timerDisplay" style="font-family: monospace;">00:00</div>
        <button id="resetBtn">⟳ 重來</button>
    </div>
</div>

    ]
},
        {
    "title": "相見歡",
    "author": "李煜",
    "sentences": [
        { "text": "無言獨上西樓，月如鉤。", "yucode": "mou jin duk she sai lau yut yue gau" },

            { "text": "不盡長江滾滾來。", "yucode": "bet jun che gog gwan gwan loi" },

            { "text": "塵凡兒纏我謗我笑我白了頭。", "yucode": "cen fan yi cin ngo bog ngo siu ngo bak liu tau" },
            { "text": "妳看那天邊追逐落日的紙鳶，", "yucode": "nei hon naa tin bin jui zuk lok jet dik zi jin" },

            { "text": "若遇那秋夜雨倦鳥也淋淋，", "yucode": "ye yyu naa cau ye yyu gyu niu ya lum lum" },
            { "text": "那卻是花墻下彌留的枯黃。", "yucode": "naa ke siz faa ceg hah mei lau dik fu vog" },
            { "text": "君住在錢塘東，妾在臨安北。", "yucode": "gwan juz zoi cin tog dug cip zoi lum on bak" },
            { "text": "君去時褐衣紅，小奴家腰上黃。", "yucode": "gwan hui see hat yi hug siu nou gaa jiu she vog" },
            { "text": "尋差了羅盤經，錯投在泉亭。", "yucode": "cum caa liu lo pun gig co tau zoi cyu tig" },
            { "text": "奴輾轉到杭城，君又生余杭。", "yucode": "nou zin zyu dou hog sig gwan yau sag yyu hog" }
        ]
    },
    {
        "title": "翩翩",
        "author": "刀郎",
        "sentences": [
            { "text": "誰不是錯過了四下報更的鼓聲，", "yucode": "sui bet siz coh gwo liu sei hah bou geg dik gu sig" },
            { "text": "總有人偷偷撥弄鏡月的指針。", "yucode": "zug yau jan tau tau but lug gig yut dik zi zum" },
            { "text": "罌缶的酒瓶化來綺紈與樓閣，", "yucode": "ag fau dik jau pig faa loi yi yuu yu lau gok" },
            { "text": "綠芭蕉紅櫻桃孑然一身的過來人。", "yucode": "luk baa jiu hug jig tou kit jin jet sen dik gwo loi jan" },
            { "text": "未曾走到絕境路彼岸花不開，", "yucode": "mei cag zau dou yut gig lou bei ngon faa bet hoi" },
            { "text": "辛酸只為長安遠倒臥在瓊臺。", "yucode": "sen syu zi wai che on yue dou ngo zoi kig toi" },
            { "text": "小心那流射的海市售賣開花杖，", "yucode": "siu sum naa lau se dik hoi siz sau mai hoi faa zog" },
            { "text": "遼遙的天河啊紛紛流淌的挽歌郎。", "yucode": "liu yiu dik tin ho ah fen fen lau tog dik wan go log" },
            { "text": "藍採和啊，醉酒當歌，", "yucode": "lam coi wo ah jui jau dog go" },
            { "text": "紅顏易老轉眼桑田泛清波。", "yucode": "hug gan yi lou zyu gan sog tin fan cig bo" },

            { "text": "是雲搖是雨散都在同一個搖籃。", "yucode": "siz wan yiu siz yyu san dou zoi tug jet go yiu lam" },

            { "text": "榮華易去青山處處英雄冢。", "yucode": "vig waa yi hui cig san cu cu yig hug cug" }
        ]
    },
    {
        "title": "羅剎海市",
        "author": "刀郎",
        "sentences": [

            { "text": "可是那從來煤蛋兒生來就黑，不管妳咋樣洗呀那也是個臟東西。", "yucode": "ho siz naa cug loi mui dan yi sag loi jau hak bet gun nei zaa yog sai ah naa ya siz go zog dug sai" },

            { "text": "西邊的歐鋼有老闆，生兒維特根斯坦。", "yucode": "sai bin dik au gog yau lou ban sag yi wai tak gen si tan" },
            { "text": "那馬戶又鳥，是我們人類根本的問題。", "yucode": "naa ma wu yau niu siz ngo mun jan lui gen bun dik mun tai" }

]
    let currentPoem = allLibrary[0];
    let userAnswers = {};
    let correctStatus = {};
    let timerSeconds = 0;

    function checkMatch(input, target) {
        const cleanInput = input.trim().replace(/\s+/g, "");
        if (!cleanInput) return false;
        const pureInput = cleanInput.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, "");
        const pureTarget = target.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, "");
        const isTextCorrect = (pureInput === pureTarget);
        const lastChar = cleanInput.slice(-1);
        const isLastPunc = /[^\u4e00-\u9fa5a-zA-Z0-9]/.test(lastChar);
        return isTextCorrect && isLastPunc;
    }

    function updateScore() {
        const total = currentPoem.sentences.length;
        const correctCount = Object.values(correctStatus).filter(v => v).length;
        document.getElementById("scoreDisplay").innerText = `正確: ${correctCount} / ${total}`;
    }

    function render() {
        document.getElementById("displayTitle").innerText = currentPoem.title;
        document.getElementById("displayAuthor").innerText = "〔" + currentPoem.author + "〕";
        document.getElementById("displayRef").innerText = currentPoem.sentences.map(s => s.text).join("");

        const area = document.getElementById("practiceArea");
        area.innerHTML = "";
        
        currentPoem.sentences.forEach((data, i) => {
            const card = document.createElement("div");
            card.className = "sentence-card" + (correctStatus[i] ? " correct-bg" : "");
            card.innerHTML = `
                <div class="chinese-line">${data.text}</div>
                <div class="yucode-hint">拆碼：<span>${data.yucode}</span></div>
                <div class="input-row">
                    <input type="text" id="input-${i}" value="${userAnswers[i] || ''}" autocomplete="off" placeholder="輸入文字+標點...">
                    <div class="status-icon" id="status-${i}">${correctStatus[i] ? "✔️" : "📝"}</div>
                </div>
            `;
            area.appendChild(card);

            const input = card.querySelector("input");
            input.addEventListener("input", (e) => {
                const val = e.target.value;
                userAnswers[i] = val;
                const isMatch = checkMatch(val, data.text);
                correctStatus[i] = isMatch;
                input.className = val === "" ? "" : (isMatch ? "correct-input" : "");
                document.getElementById(`status-${i}`).innerText = isMatch ? "✔️" : (val === "" ? "📝" : "❌");
                card.classList.toggle("correct-bg", isMatch);
                updateScore();
                
                if (isMatch && i < currentPoem.sentences.length - 1) {
                    const next = document.getElementById(`input-${i+1}`);
                    if (next) {
                        next.focus();
                        next.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            });
        });
        updateScore();
    }

    // 選單切換邏輯
    document.getElementById("poemSelector").addEventListener("change", function(e) {
        currentPoem = allLibrary[e.target.value];
        userAnswers = {};
        correctStatus = {};
        render();
    });

    // 重來按鈕
    document.getElementById("resetBtn").onclick = () => {
        userAnswers = {};
        correctStatus = {};
        render();
    };

    // 計時器
    setInterval(() => {
        timerSeconds++;
        const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
        const s = (timerSeconds % 60).toString().padStart(2, '0');
        document.getElementById("timerDisplay").innerText = `${m}:${s}`;
    }, 1000);

    // 啟動
    render();
</script>

</body>
</html>
